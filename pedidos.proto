syntax = "proto3";

option java_package = "com.tap2eat.api.grpc"; // Asegúrate que este paquete coincida con tu estructura
option java_multiple_files = true;

package tap2eat;

// El servicio que el Cliente Rico (Electron) consumirá del Backend (Python/Java)
service PedidosService {
  // Método RPC para registrar un nuevo pedido
  rpc CrearPedido (PedidoRequest) returns (PedidoResponse);
}

// Los datos que el Cliente envía al Servidor
message PedidoRequest {
  string id_cliente = 1;
  string id_restaurante = 2;
  repeated string id_productos = 3; // Lista de platillos
  string notas_especiales = 4;
}

// Los datos que el Servidor le responde al Cliente
message PedidoResponse {
  string id_pedido = 1;
  string estado = 2; // Ejemplo: "PENDIENTE"
  string codigo_qr = 3; // El token para el QR
  double total_pagar = 4;
}